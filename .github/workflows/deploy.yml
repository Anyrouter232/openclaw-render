name: Build and deploy openclaw

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'boot.mjs'
      - 'start.sh'
      - 'config/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.OPENCLAW_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.OPENCLAW_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.OPENCLAW_AZURE_SUBSCRIPTION_ID }}

      - name: Build + push + deploy
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: openclawbd.azurecr.io
          registryUsername: ${{ secrets.OPENCLAW_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.OPENCLAW_REGISTRY_PASSWORD }}
          containerAppName: openclaw
          resourceGroup: openclaw-rg
          imageToBuild: openclawbd.azurecr.io/openclaw:${{ github.sha }}
